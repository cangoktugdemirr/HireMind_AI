<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy Blue Color for all elements -->
  <g fill="#1A263E">
    <!-- The Combined H and R structure -->
    <!-- Left vertical bar of H -->
    <rect x="100" y="80" width="50" height="240" rx="4"/>
    
    <!-- Right vertical bar of H / Left bar of R -->
    <rect x="230" y="80" width="50" height="240" rx="4"/>
    
    <!-- Crossbar of H -->
    <rect x="150" y="175" width="80" height="40"/>
    
    <!-- Top Bowl of R -->
    <path d="M280 80C320 80 340 100 340 140C340 180 320 200 280 200H280" stroke="#1A263E" stroke-width="50" stroke-linecap="round"/>
    
    <!-- Diagonal Leg of R -->
    <path d="M260 200L320 320" stroke="#1A263E" stroke-width="50" stroke-linecap="round"/>

    <!-- Swoosh / Orbit Line -->
    <path d="M40 300C30 330 150 380 250 350C370 310 390 180 380 120C370 60 280 30 180 40C80 50 30 110 40 220" stroke="#1A263E" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Table and Chairs Detail (Inside the spaces) -->
  <g stroke="#1A263E" stroke-width="2">
    <!-- Square Table in center -->
    <rect x="180" y="220" width="40" height="30" rx="2" fill="none"/>
    <!-- Left Chair -->
    <path d="M155 220H170V250H155M155 240H170" stroke-linecap="round"/>
    <!-- Right Chair -->
    <path d="M245 220H230V250H245M245 240H230" stroke-linecap="round"/>
  </g>
</svg>
