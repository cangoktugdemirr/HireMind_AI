<svg width="256" height="256" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- HireMind HR Logo - Orbital swoosh ile mülakat masalı HR logosu -->
  
  <!-- H Harfi -->
  <rect x="80" y="120" width="42" height="272" fill="#162544"/>
  <rect x="80" y="120" width="42" height="36" fill="#162544"/>
  <rect x="175" y="120" width="42" height="272" fill="#162544"/>
  <rect x="80" y="232" width="137" height="42" fill="#162544"/>

  <!-- R Harfi -->
  <rect x="262" y="120" width="42" height="272" fill="#162544"/>
  <!-- R üst kafa (yarım daire) -->
  <path d="M262 120 L262 156 L340 156 Q380 156 380 200 Q380 232 340 232 L262 232 L262 120 L340 120 Q395 120 395 192 Q395 232 340 232" fill="#162544"/>
  <!-- R bacak (çapraz) -->
  <polygon points="300,232 330,232 395,392 365,392" fill="#162544"/>

  <!-- Mülakat Masası (HR harfleri arasında, ortada alt kısımda) -->
  <!-- Masa yüzeyi -->
  <rect x="195" y="295" width="76" height="8" rx="4" fill="#162544"/>
  <!-- Masa ayağı ortada -->
  <rect x="230" y="303" width="6" height="30" fill="#162544"/>
  <!-- Masa tabanı -->
  <rect x="218" y="333" width="30" height="6" rx="3" fill="#162544"/>

  <!-- Sol sandalye -->
  <rect x="196" y="315" width="20" height="6" rx="3" fill="#162544"/>
  <rect x="196" y="295" width="5" height="26" rx="2" fill="#162544"/>
  <rect x="198" y="321" width="4" height="14" fill="#162544"/>
  <rect x="212" y="321" width="4" height="14" fill="#162544"/>

  <!-- Sağ sandalye -->
  <rect x="250" y="315" width="20" height="6" rx="3" fill="#162544"/>
  <rect x="265" y="295" width="5" height="26" rx="2" fill="#162544"/>
  <rect x="252" y="321" width="4" height="14" fill="#162544"/>
  <rect x="266" y="321" width="4" height="14" fill="#162544"/>

  <!-- Orbital Swoosh - üst yarısı (harflerin önünden geçer) -->
  <path d="M 30 220 Q 60 130, 180 115 Q 256 105, 360 120 Q 460 140, 485 220" 
        stroke="#162544" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Orbital Swoosh - alt yarısı (harflerin arkasından geçer, daha ince/silik) -->
  <path d="M 485 220 Q 465 280, 360 295 Q 256 310, 150 295 Q 55 275, 30 220" 
        stroke="#162544" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>
</svg>
